<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TV 遙控器 Receiver</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f0f1a;
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Google Sans', 'Noto Sans TC', sans-serif;
  }

  /* 等待畫面 */
  #waiting {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100vw; height: 100vh;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f2a 100%);
    color: white;
  }

  #waiting .icon { font-size: 5rem; margin-bottom: 1.5rem; }
  #waiting h1   { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.75rem; }
  #waiting p    { font-size: 1.4rem; color: rgba(255,255,255,0.55); }

  .dots span {
    display: inline-block;
    width: 10px; height: 10px;
    margin: 0 5px; border-radius: 50%;
    background: rgba(255,255,255,0.5);
    animation: blink 1.4s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: 0.25s; }
  .dots span:nth-child(3) { animation-delay: 0.5s; }
  @keyframes blink { 0%,80%,100% { opacity:0.2; } 40% { opacity:1; } }

  /* YouTube 播放器 */
  #player {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    border: none;
    background: #000;
  }
</style>

<!-- Cast Receiver SDK（必須放在 head） -->
<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>

<!-- 等待畫面 -->
<div id="waiting">
  <div class="icon">📺</div>
  <h1>TV 遙控器</h1>
  <p style="margin-bottom:2rem">等待播放指令</p>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<!-- YouTube IFrame 播放器 -->
<iframe id="player"
  allow="autoplay; fullscreen"
  allowfullscreen>
</iframe>

<script>
  // ── 設定 ──────────────────────────────────────────────────────────────────
  // 這個 namespace 必須和 Android App 裡的 CUSTOM_NS 完全相同
  const NAMESPACE = 'urn:x-cast:com.example.tvremote';

  // ── Cast Receiver 初始化 ───────────────────────────────────────────────────
  const context = cast.framework.CastReceiverContext.getInstance();

  context.addCustomMessageListener(NAMESPACE, function(event) {
    const data = event.data;
    console.log('[TV Remote] Received:', JSON.stringify(data));

    if (data.type === 'playVideo' && data.videoId) {
      playVideo(data.videoId, data.channelName || '');
    }
  });

  context.start({
    touchScreenOptimizedApp: false,
    maxInactivity: 3600   // 閒置 1 小時才斷線
  });

  // ── 播放函式 ──────────────────────────────────────────────────────────────
  function playVideo(videoId, channelName) {
    console.log('[TV Remote] Playing:', videoId, channelName);

    // 隱藏等待畫面，顯示播放器
    document.getElementById('waiting').style.display = 'none';
    const player = document.getElementById('player');
    player.style.display = 'block';

    // 用 YouTube Embed（自動播放、直播模式）
    const params = new URLSearchParams({
      autoplay: '1',
      rel: '0',
      modestbranding: '1',
      iv_load_policy: '3',
      // 直播用 start=0，VOD 也相容
      start: '0'
    });

    player.src = `https://www.youtube.com/embed/${videoId}?${params.toString()}`;
  }
</script>
</body>
</html>
