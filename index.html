<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>TV 遙控器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }

  #waiting {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100vw; height: 100vh;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
    color: #fff; font-family: 'Google Sans', sans-serif;
  }
  #waiting .icon { font-size: 5rem; margin-bottom: 1rem; }
  #waiting h1   { font-size: 2.5rem; margin-bottom: 0.5rem; }
  #waiting p    { font-size: 1.3rem; color: rgba(255,255,255,0.5); }

  /* YouTube IFrame API 會把 <iframe> 插入這裡 */
  #player {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
  }
  #player iframe {
    width: 100%; height: 100%;
    border: none;
  }
</style>

<!-- 1. Cast Receiver SDK -->
<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<!-- 2. YouTube IFrame API（非同步載入） -->
<script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<div id="waiting">
  <div class="icon">📺</div>
  <h1>TV 遙控器 (V1.01)</h1>
  <p>等待播放指令...</p>
</div>

<!-- YouTube IFrame API 的目標容器 -->
<div id="player"></div>

<script>
// ── 設定 ──────────────────────────────────────────────────────────────────
const NAMESPACE = 'urn:x-cast:com.example.tvremote';

// ── 狀態 ──────────────────────────────────────────────────────────────────
var ytPlayer    = null;   // YouTube Player 物件
var ytReady     = false;  // IFrame API 是否就緒
var pendingId   = null;   // 在 API 就緒前收到的 videoId

// ── YouTube IFrame API 就緒回呼（API 自動呼叫這個函式）─────────────────
function onYouTubeIframeAPIReady() {
  console.log('[Receiver] YouTube IFrame API ready');
  ytReady = true;
  if (pendingId) {
    loadVideo(pendingId);
    pendingId = null;
  }
}

// ── 建立 / 切換播放器 ──────────────────────────────────────────────────
function loadVideo(videoId) {
  console.log('[Receiver] loadVideo:', videoId);

  // 隱藏等待畫面，顯示播放器
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('player').style.display  = 'block';

  if (ytPlayer) {
    // 播放器已存在 → 直接換影片
    ytPlayer.loadVideoById({ videoId: videoId });
    return;
  }

  // 第一次建立播放器
  ytPlayer = new YT.Player('player', {
    width:   window.innerWidth,
    height:  window.innerHeight,
    videoId: videoId,
    playerVars: {
      autoplay:        1,
      mute:            1,   // ★ 先靜音才能自動播放（瀏覽器政策）
      controls:        0,   // 隱藏控制列
      rel:             0,   // 不顯示相關影片
      modestbranding:  1,
      iv_load_policy:  3,   // 關閉資訊標注
      playsinline:     1
    },
    events: {
      onReady: function(e) {
        console.log('[Receiver] Player ready → play');
        e.target.playVideo();
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.PLAYING) {
          // ★ 真正開始播放後立即取消靜音
          e.target.unMute();
          e.target.setVolume(100);
          console.log('[Receiver] Unmuted');
        }
        // 若被瀏覽器暫停，強制繼續
        if (e.data === YT.PlayerState.PAUSED) {
          setTimeout(function() {
            if (ytPlayer) ytPlayer.playVideo();
          }, 500);
        }
      },
      onError: function(e) {
        console.error('[Receiver] Player error:', e.data);
      }
    }
  });
}

// ── Cast Receiver 訊息處理 ─────────────────────────────────────────────
const context = cast.framework.CastReceiverContext.getInstance();

context.addCustomMessageListener(NAMESPACE, function(event) {
  var data = event.data;
  console.log('[Receiver] Message:', JSON.stringify(data));

  if (data.type === 'playVideo' && data.videoId) {
    if (ytReady) {
      loadVideo(data.videoId);
    } else {
      // API 還沒就緒，先存起來
      pendingId = data.videoId;
    }
  }
});

context.start({
  touchScreenOptimizedApp: false,
  maxInactivity: 3600
});
</script>
</body>
</html>
