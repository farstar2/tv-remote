<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<title>TV 遙控器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }

  #waiting {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100vw; height: 100vh;
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
    color: #fff; font-family: sans-serif;
    transition: opacity 0.5s;
  }
  #waiting .icon { font-size: 5rem; margin-bottom: 1rem; }
  #waiting h1   { font-size: 2.5rem; margin-bottom: 0.5rem; }
  #waiting p    { font-size: 1.3rem; color: rgba(255,255,255,0.5); }

  #ytFrame {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    border: none;
  }
</style>
<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>

<div id="waiting">
  <div class="icon">📺</div>
  <h1>TV 遙控器(V1.02)</h1>
  <p>等待播放指令...</p>
</div>

<!-- YouTube embed iframe（用 src 控制，不用 IFrame API） -->
<iframe id="ytFrame"
  allow="autoplay; fullscreen; encrypted-media"
  allowfullscreen>
</iframe>

<script>
const NAMESPACE = 'urn:x-cast:com.example.tvremote';
var currentVideoId = null;
var unmuteTimer    = null;

// ── 播放函式 ────────────────────────────────────────────────────────────────
function loadVideo(videoId) {
  if (videoId === currentVideoId) return;   // 同一個頻道不重複載入
  currentVideoId = videoId;

  console.log('[Receiver] loadVideo:', videoId);

  // 隱藏等待畫面
  document.getElementById('waiting').style.display = 'none';

  var frame = document.getElementById('ytFrame');
  frame.style.display = 'block';

  // 設定 iframe src：autoplay=1, mute=1（靜音自動播放），enablejsapi=1（允許 postMessage）
  var params = [
    'autoplay=1',
    'mute=1',
    'controls=0',
    'rel=0',
    'modestbranding=1',
    'iv_load_policy=3',
    'playsinline=1',
    'enablejsapi=1',
    'origin=' + encodeURIComponent(location.origin)
  ].join('&');

  frame.src = 'https://www.youtube.com/embed/' + videoId + '?' + params;

  // 清掉舊計時器
  if (unmuteTimer) clearTimeout(unmuteTimer);

  // ★ 2 秒後取消靜音（用 postMessage，不依賴 IFrame API）
  unmuteTimer = setTimeout(function() {
    unmute();
  }, 2000);
}

// ── 取消靜音（postMessage to YouTube iframe）────────────────────────────────
function unmute() {
  var frame = document.getElementById('ytFrame');
  if (!frame || !frame.contentWindow) return;

  console.log('[Receiver] Unmuting via postMessage');

  // unMute
  frame.contentWindow.postMessage(JSON.stringify({
    event: 'command', func: 'unMute', args: []
  }), '*');

  // setVolume 100
  setTimeout(function() {
    frame.contentWindow.postMessage(JSON.stringify({
      event: 'command', func: 'setVolume', args: [100]
    }), '*');

    // playVideo（以防萬一被暫停）
    setTimeout(function() {
      frame.contentWindow.postMessage(JSON.stringify({
        event: 'command', func: 'playVideo', args: []
      }), '*');
    }, 300);
  }, 300);
}

// ── 監聽 YouTube iframe 的狀態訊息 ──────────────────────────────────────────
window.addEventListener('message', function(e) {
  try {
    var data = JSON.parse(e.data);
    // info.playerState: -1=unstarted, 0=ended, 1=playing, 2=paused, 3=buffering
    if (data.info && data.info.playerState === 2) {
      // 被暫停 → 重新播放 + 取消靜音
      console.log('[Receiver] Paused detected, resuming...');
      setTimeout(function() { unmute(); }, 500);
    }
  } catch(err) {}
});

// ── Cast Receiver ────────────────────────────────────────────────────────────
var context = cast.framework.CastReceiverContext.getInstance();

context.addCustomMessageListener(NAMESPACE, function(event) {
  var data = event.data;
  console.log('[Receiver] Message:', JSON.stringify(data));
  if (data.type === 'playVideo' && data.videoId) {
    loadVideo(data.videoId);
  }
});

context.start({ touchScreenOptimizedApp: false, maxInactivity: 3600 });
</script>
</body>
</html>
